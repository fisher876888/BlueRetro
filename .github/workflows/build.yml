name: build
on:
  workflow_dispatch:
    inputs:
      board:
        description: 'Board (HW1/HW2/etc)'
        required: true
        default: 'HW1'
      chip:
        description: 'Chip (ESP32/ESP32S3/etc)'
        required: true
        default: 'ESP32'
      options:
        description: 'Options (UART HID/BLE/etc)'
        required: true
        default: 'UART HID'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.1
          target: ${{ inputs.chip }}

      - name: Configure UART HID
        run: |
          # 核心：强制启用UART HID，禁用其他所有输出
          sed -i 's/CONFIG_BLUERETRO_OUTPUT_BLE=y/CONFIG_BLUERETRO_OUTPUT_BLE=n/' sdkconfig.defaults
          sed -i 's/CONFIG_BLUERETRO_OUTPUT_UART_HID=n/CONFIG_BLUERETRO_OUTPUT_UART_HID=y/' sdkconfig.defaults
          idf.py set-target ${{ inputs.chip }}

      - name: Build firmware
        run: idf.py build

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: blueretro_${{ inputs.chip }}_${{ inputs.board }}_${{ inputs.options }}
          path: build/blueretro.bin
